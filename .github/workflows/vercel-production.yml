# Production-деплой через Vercel CLI (как в https://vercel.com/guides/how-can-i-use-github-actions-with-vercel).
#
# ВАЖНО: без секретов этот workflow НЕ деплоит (шаги пропускаются — в логах будет run=false).
# Тогда сайт обновляется только если в Vercel подключён этот репозиторий (Project → Settings → Git).
#
# Чтобы деплой шёл из GitHub Actions, добавьте в репозиторий:
#   Settings → Secrets and variables → Actions → New repository secret
#   - VERCEL_TOKEN — https://vercel.com/account/tokens
#   - VERCEL_ORG_ID — Team ID из Vercel (Settings → Team / или в .vercel/project.json после vercel link)
#   - VERCEL_PROJECT_ID — Project Settings → General
# Проект в Vercel должен иметь Root Directory = kimi2/app (как при локальном link в этой папке).
#
# Если одновременно включены Git-интеграция и эти секреты — на один push будет два деплоя; отключите один канал.
name: Vercel production (CLI)
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Проверка секретов Vercel
        id: gate
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Деплой из Actions выключен::В репозитории нет VERCEL_TOKEN — шаги vercel pull/build/deploy пропускаются. Сайт обновится только через интеграцию Vercel↔GitHub (Vercel → Project → Settings → Git → Connected Git Repository). Либо добавьте секреты VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID — см. комментарий в начале .github/workflows/vercel-production.yml"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Установить Vercel CLI
        if: steps.gate.outputs.run == 'true'
        run: npm install -g vercel@latest

      - name: Pull, build, deploy (production)
        if: steps.gate.outputs.run == 'true'
        working-directory: kimi2/app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
