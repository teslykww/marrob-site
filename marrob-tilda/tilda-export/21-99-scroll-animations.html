<!-- MARROB — TiltCard, AnimatedCounter, FadeUpText. Вставьте один раз в конец страницы. Блоки не скрываются — на Tilda контент всегда виден. -->
<style>
  .marrob-tilt {
    transform-style: preserve-3d;
    perspective: 1000px;
    transition: transform 0.3s ease;
  }
  .marrob-tilt-inner {
    transition: transform 0.3s ease;
    transform-style: preserve-3d;
  }
  .marrob-tilt-glare {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .marrob-tilt:hover .marrob-tilt-glare { opacity: 1; }
</style>
<script>
(function() {
  'use strict';

  var PERSPECTIVE = 1000;

  function initTilt() {
    document.querySelectorAll('.marrob-tilt').forEach(function(el) {
      var amount = parseInt(el.getAttribute('data-tilt-amount'), 10) || 8;
      var inner = el.querySelector('.marrob-tilt-inner') || el;
      var glare = el.querySelector('.marrob-tilt-glare');
      if (inner === el && !el.querySelector('.marrob-tilt-inner')) {
        var wrap = document.createElement('div');
        wrap.className = 'marrob-tilt-inner';
        while (el.firstChild) wrap.appendChild(el.firstChild);
        el.appendChild(wrap);
        inner = wrap;
      }
      if (!glare && el.querySelector('.marrob-tilt-inner')) {
        glare = document.createElement('div');
        glare.className = 'marrob-tilt-glare';
        el.appendChild(glare);
      }
      el.addEventListener('mouseenter', function() {
        inner.style.transform = 'scale(1.02)';
      });
      el.addEventListener('mouseleave', function() {
        inner.style.transform = 'rotateX(0) rotateY(0) scale(1)';
        if (glare) glare.style.background = '';
      });
      el.addEventListener('mousemove', function(e) {
        var rect = el.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        var mx = (e.clientX - cx) / (rect.width / 2);
        var my = (e.clientY - cy) / (rect.height / 2);
        var rx = -my * amount;
        var ry = mx * amount;
        inner.style.transform = 'rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) scale(1.02)';
        if (glare) {
          var px = ((e.clientX - rect.left) / rect.width) * 100;
          var py = ((e.clientY - rect.top) / rect.height) * 100;
          glare.style.background = 'radial-gradient(circle at ' + px + '% ' + py + '%, rgba(255,255,255,0.25) 0%, transparent 60%)';
        }
      });
    });
  }

  function initCounters() {
    document.querySelectorAll('.marrob-counter').forEach(function(el) {
      var end = parseInt(el.getAttribute('data-end'), 10);
      if (isNaN(end)) return;
      var suffix = el.getAttribute('data-suffix') || '';
      var prefix = el.getAttribute('data-prefix') || '';
      var duration = 2000;
      var start = 0;
      var startTime = null;
      var done = false;
      function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var elapsed = timestamp - startTime;
        var progress = Math.min(elapsed / duration, 1);
        var ease = 1 - Math.pow(1 - progress, 2);
        var value = Math.floor(start + (end - start) * ease);
        el.textContent = prefix + value.toLocaleString('ru-RU') + suffix;
        if (progress < 1) requestAnimationFrame(step);
        else done = true;
      }
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting && !done) {
            requestAnimationFrame(step);
          }
        });
      }, { rootMargin: '-80px 0px', threshold: 0.1 });
      io.observe(el);
    });
  }

  function run() {
    initTilt();
    initCounters();
  }

  if (document.readyState === 'loading')
    document.addEventListener('DOMContentLoaded', run);
  else
    run();
})();
</script>
