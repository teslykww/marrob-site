<!-- MARROB — Блок 12: Сертификаты. Клик открывает просмотр (как на kimi2). Замените src на URL из Медиабиблиотеки Tilda. -->
<div class="marrob-block marrob-block-certs" id="certs">
  <section class="marrob-certs">
    <div class="marrob-certs__inner">
      <div class="marrob-certs__head">
        <span class="marrob-certs__badge marrob-fade-up">Надёжность</span>
        <h2 class="marrob-certs__title marrob-font-display marrob-fade-up marrob-fade-up-delay-1">Сертификаты</h2>
        <p class="marrob-certs__subtitle marrob-fade-up marrob-fade-up-delay-2">Соответствие ГОСТ и современным стандартам качества</p>
      </div>
      <div class="marrob-certs__grid">
        <button type="button" class="marrob-certs__item marrob-fade-up" data-marrob-cert-open="0" aria-label="Открыть документ">
          <img src="assets/certs/reestr-vyborklientov-2023.png" alt="" class="marrob-certs__img" loading="lazy">
          <p class="marrob-certs__name">Реестр эффективных предприятий и номинация «Выбор клиентов и партнёров 2023» (топ 4%)</p>
        </button>
        <button type="button" class="marrob-certs__item marrob-fade-up marrob-fade-up-delay-1" data-marrob-cert-open="1" aria-label="Открыть документ">
          <img src="assets/certs/trademark-marrob.png" alt="" class="marrob-certs__img" loading="lazy">
          <p class="marrob-certs__name">Свидетельство на товарный знак MARROB (Роспатент, до 2033)</p>
        </button>
        <button type="button" class="marrob-certs__item marrob-fade-up marrob-fade-up-delay-2" data-marrob-cert-open="2" aria-label="Открыть документ">
          <img src="assets/certs/mosbuild-2023.png" alt="" class="marrob-certs__img" loading="lazy">
          <p class="marrob-certs__name">Участник 28-й Международной выставки MosBuild (28–31.03.2023)</p>
        </button>
        <button type="button" class="marrob-certs__item marrob-fade-up marrob-fade-up-delay-3" data-marrob-cert-open="3" aria-label="Открыть документ">
          <img src="assets/certs/cert-thermo-stone.png" alt="" class="marrob-certs__img" loading="lazy">
          <p class="marrob-certs__name">Сертификат соответствия «Thermo stone» (Промтехстандарт, до 2026)</p>
        </button>
      </div>
    </div>
  </section>
  <div class="marrob-certs-modal" id="marrob-certs-modal" role="dialog" aria-modal="true" aria-labelledby="marrob-certs-modal-title" hidden>
    <div class="marrob-certs-modal__backdrop" id="marrob-certs-modal-backdrop"></div>
    <div class="marrob-certs-modal__panel">
      <button type="button" class="marrob-certs-modal__close" id="marrob-certs-modal-close" aria-label="Закрыть">&times;</button>
      <div class="marrob-certs-modal__body">
        <img src="" alt="" class="marrob-certs-modal__img" id="marrob-certs-modal-img" width="800" height="1000">
        <p class="marrob-certs-modal__caption" id="marrob-certs-modal-title"></p>
      </div>
    </div>
  </div>
</div>
<style>
  .marrob-block-certs { background: var(--marrob-bg-card); position: relative; border-top: 1px solid var(--marrob-border); }
  .marrob-certs { padding: 80px 24px; font-family: var(--marrob-font-body); }
  .marrob-certs__inner { max-width: 1280px; margin: 0 auto; }
  .marrob-certs__head { text-align: center; margin-bottom: 48px; }
  .marrob-certs__badge {
    display: inline-block;
    padding: 8px 20px;
    background: rgba(196, 92, 62, 0.1);
    color: var(--marrob-primary);
    font-size: 0.875rem;
    font-weight: 500;
    border-radius: 999px;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .marrob-certs__title { font-size: 1.75rem; font-weight: 600; color: var(--marrob-text); margin: 0 0 12px; }
  @media (min-width: 768px) { .marrob-certs__title { font-size: 2.25rem; } }
  .marrob-certs__subtitle { font-size: 1.0625rem; color: var(--marrob-text-muted); margin: 0; }
  .marrob-certs__grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  @media (min-width: 768px) { .marrob-certs__grid { grid-template-columns: repeat(4, 1fr); gap: 32px; } }
  .marrob-certs__item {
    text-align: center;
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    font: inherit;
    color: inherit;
    width: 100%;
  }
  .marrob-certs__item:focus-visible {
    outline: 2px solid var(--marrob-primary);
    outline-offset: 4px;
    border-radius: 8px;
  }
  .marrob-certs__img { width: 100%; max-width: 240px; height: auto; border: 1px solid var(--marrob-border); border-radius: 4px; box-shadow: var(--marrob-shadow); margin: 0 auto 16px; display: block; transition: transform 0.3s, box-shadow 0.3s; }
  .marrob-certs__item:hover .marrob-certs__img { transform: translateY(-4px); box-shadow: var(--marrob-shadow-hover); }
  .marrob-certs__name { font-size: 0.875rem; color: var(--marrob-text-muted); line-height: 1.4; margin: 0; }
  .marrob-certs-modal { position: fixed; inset: 0; z-index: 10050; display: flex; align-items: center; justify-content: center; padding: 16px; box-sizing: border-box; }
  .marrob-certs-modal[hidden] { display: none !important; }
  .marrob-certs-modal__backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.55); }
  .marrob-certs-modal__panel {
    position: relative;
    z-index: 1;
    max-width: min(920px, 96vw);
    max-height: min(90vh, 900px);
    background: #fff;
    border-radius: var(--marrob-radius-lg);
    box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    overflow: auto;
    padding: 48px 20px 24px;
  }
  .marrob-certs-modal__close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 999px;
    background: #f3f3f3;
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
    color: var(--marrob-text);
  }
  .marrob-certs-modal__close:hover { background: #e8e8e8; }
  .marrob-certs-modal__img {
    display: block;
    width: 100%;
    height: auto;
    max-height: min(72vh, 720px);
    object-fit: contain;
    margin: 0 auto;
  }
  .marrob-certs-modal__caption {
    margin: 16px 8px 0;
    text-align: center;
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--marrob-text);
    line-height: 1.45;
  }
</style>
<script>
(function () {
  var items = document.querySelectorAll('[data-marrob-cert-open]');
  var modal = document.getElementById('marrob-certs-modal');
  if (!modal || !items.length) return;
  var backdrop = document.getElementById('marrob-certs-modal-backdrop');
  var closeBtn = document.getElementById('marrob-certs-modal-close');
  var imgEl = document.getElementById('marrob-certs-modal-img');
  var capEl = document.getElementById('marrob-certs-modal-title');
  function openModal(idx) {
    var btn = document.querySelector('[data-marrob-cert-open="' + idx + '"]');
    if (!btn) return;
    var im = btn.querySelector('.marrob-certs__img');
    var cap = btn.querySelector('.marrob-certs__name');
    if (im) {
      imgEl.src = im.getAttribute('src') || '';
      imgEl.alt = cap ? cap.textContent.trim() : '';
    }
    capEl.textContent = cap ? cap.textContent.trim() : '';
    modal.removeAttribute('hidden');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    modal.setAttribute('hidden', '');
    document.body.style.overflow = '';
    imgEl.removeAttribute('src');
  }
  items.forEach(function (el) {
    el.addEventListener('click', function () {
      openModal(el.getAttribute('data-marrob-cert-open'));
    });
  });
  if (backdrop) backdrop.addEventListener('click', closeModal);
  if (closeBtn) closeBtn.addEventListener('click', closeModal);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !modal.hasAttribute('hidden')) closeModal();
  });
})();
</script>
